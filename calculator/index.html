<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>
	<link rel="stylesheet" href="./styles.css">
	<script src="./js/main.js" type="module"></script>
</head>
<body>
	<div id="main">
		<header>
			<h1>Odin calculator</h1>
		</header>
		<div id="display">
			<span class="text"></span>
		</div>
		<ul>
			<li><button id="btn-1">1</button></li>
			<li><button id="btn-2">2</button></li>
			<li><button id="btn-3">3</button></li>
			<li><button id="btn-4">4</button></li>
			<li><button id="btn-5">5</button></li>
			<li><button id="btn-6">6</button></li>
			<li><button id="btn-7">7</button></li>
			<li><button id="btn-8">8</button></li>
			<li><button id="btn-9">9</button></li>
			<li><button id="btn-+">+</button></li>
			<li><button id="btn-0">0</button></li>
			<li><button id="btn--">-</button></li>
			<li><button id="btn-*">*</button></li>
			<li><button id="btn-/">/</button></li>
			<li><button id="btn-=">=</button></li>
			<li><button id="btn-.">.</button></li>
			<li><button id="btn-del">del</button></li>
			<li><button id="btn-clear">clear</button></li>
		</ul>
	</div>
</body>
</html>
